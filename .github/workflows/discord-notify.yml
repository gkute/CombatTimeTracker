name: Notify Discord on Release

on:
  workflow_run:
    workflows: ["Package and release CTT"]
    types:
      - completed

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          # For workflow_run events triggered by a tag push, head_branch is null.
          # Resolve the tag from the triggering commit SHA instead.
          VERSION=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | head -n1)
          if [ -z "$VERSION" ]; then
            echo "No tag found for commit ${{ github.event.workflow_run.head_sha }}, skipping."
            exit 0
          fi
          # $2 is the version token — headings use the simple "## vX.Y.Z" format.
          NOTES=$(awk -v ver="$VERSION" '/^## /{found=($2==ver); next} found&&/^## /{exit} found{print}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES=$(awk '/^## @project-version@/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entries found for ${VERSION}."
          fi
          # Write raw — jq will handle all escaping in the next step.
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          NOTES="${{ steps.changelog.outputs.notes }}"
          CURSEFORGE_URL="https://www.curseforge.com/wow/addons/combattimetracker"
          GITHUB_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          AVATAR_URL="https://raw.githubusercontent.com/${{ github.repository }}/master/Assets/CombatTimeTracker.png"

          # Use jq to build the payload so all special characters (backticks, quotes,
          # newlines) are escaped correctly — no manual string interpolation into JSON.
          PAYLOAD=$(jq -n \
            --arg title "Combat Time Tracker ${VERSION} Released!" \
            --arg description "$NOTES" \
            --arg download "[CurseForge](${CURSEFORGE_URL}) • [GitHub](${GITHUB_URL})" \
            --arg avatar "$AVATAR_URL" \
            '{
              username: "Combat Time Tracker",
              avatar_url: $avatar,
              embeds: [{
                title: $title,
                color: 16724736,
                description: $description,
                fields: [{
                  name: "Download",
                  value: $download,
                  inline: false
                }],
                footer: { text: "Combat Time Tracker" }
              }]
            }')

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
