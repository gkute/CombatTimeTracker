name: Notify Discord on Release

on:
  workflow_run:
    workflows: ["Package and release CTT"]
    types:
      - completed

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          # For workflow_run events triggered by a tag push, head_branch is null.
          # Resolve the tag from the triggering commit SHA instead.
          VERSION=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | head -n1)
          if [ -z "$VERSION" ]; then
            echo "No tag found for commit ${{ github.event.workflow_run.head_sha }}, skipping."
            exit 0
          fi
          # Use a prefix match so headings like "## v12.0.11 - 2026-03-29" are found correctly.
          NOTES=$(awk -v ver="$VERSION" 'substr($0,1,3+length(ver))=="## "ver{found=1;next} found&&/^## /{exit} found{print}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES=$(awk '/^## @project-version@/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entries found for ${VERSION}."
          fi
          # Escape special characters for JSON
          NOTES="${NOTES//$'\\'/$'\\\\'}"
          NOTES="${NOTES//$'"'/$'\\"'}"
          NOTES="${NOTES//$'\n'/\\n}"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          NOTES="${{ steps.changelog.outputs.notes }}"
          CURSEFORGE_URL="https://www.curseforge.com/wow/addons/combattimetracker"
          GITHUB_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"

          PAYLOAD=$(cat <<EOF
          {
            "username": "Combat Time Tracker",
            "avatar_url": "https://raw.githubusercontent.com/${{ github.repository }}/master/Assets/CombatTimeTracker.png",
            "embeds": [
              {
                "title": "Combat Time Tracker ${VERSION} Released!",
                "color": 16724736,
                "description": "${NOTES}",
                "fields": [
                  {
                    "name": "Download",
                    "value": "[CurseForge](${CURSEFORGE_URL}) • [GitHub](${GITHUB_URL})",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "Combat Time Tracker"
                }
              }
            ]
          }
          EOF
          )

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
