# This is a basic workflow to help you get started with Actions

name: Package and release CTT

# Controls when the action will run. 
on:
  # Only run automatically for pushed tags. A later step verifies the tag points at master.
  push:
    tags:
      - '*'
    paths-ignore:
      - '.github/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# a workflow is built up as jobs, and within these jobs are steps
jobs:

  # "release" is a job, you can name it anything you want
  release:

    # we can run our steps on pretty much anything, but the "ubuntu-latest" image is a safe bet
    runs-on: ubuntu-latest

    # specify the environment variables used by the packager, matching the secrets from the project on GitHub
    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}  # "GITHUB_TOKEN" is a secret always provided to the workflow
                                                 # for your own token, the name cannot start with "GITHUB_"

    # "steps" holds a list of all the steps needed to package and release our AddOn
    steps:

      # we first have to clone the AddOn project, this is a required step
      - name: Checkout addon
        uses: actions/checkout@v1 # note: v2 breaks git history, so generating a changelog and
                                  # file naming for alpha builds will not work properly

      - name: Verify tag points to master
        id: tagged_master
        run: |
          git fetch --force origin master
          if git branch -r --contains "$GITHUB_SHA" | grep -q "origin/master"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install subversion
        if: github.event_name == 'workflow_dispatch' || steps.tagged_master.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y subversion

      # once cloned, we just run the GitHub Action for the packager project
      - name: Package and release
        if: github.event_name == 'workflow_dispatch' || steps.tagged_master.outputs.run == 'true'
        uses: BigWigsMods/packager@master
